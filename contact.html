<script id="theme-manager">
    (function() {
        const theme = localStorage.getItem('theme') || 'system';
        const html = document.documentElement;
        
        function applyTheme(t) {
            if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
                html.classList.remove('light');
            } else {
                html.classList.remove('dark');
                html.classList.add('light');
            }
        }
        
        applyTheme(theme);
        
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (localStorage.getItem('theme') === 'system') {
                applyTheme('system');
            }
        });
    })();
</script>

<script id="progress-tracker">
    (function() {
        const pages = ['index.html', 'about.html', 'projects.html', 'skills.html', 'contact.html'];
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        
        let visited = JSON.parse(localStorage.getItem('visitedPages') || '[]');
        if (pages.includes(currentPage) && !visited.includes(currentPage)) {
            visited.push(currentPage);
            localStorage.setItem('visitedPages', JSON.stringify(visited));
        }
        
        const count = visited.length;
        const total = pages.length;
        
        document.querySelectorAll('.progress-text').forEach(el => {
            el.textContent = `Progress: ${count}/${total}`;
        });

        // Update about.html specific progress bar if exists
        const percentText = document.getElementById('progress-percent');
        if (percentText) {
            const percent = Math.round((count / total) * 100);
            percentText.textContent = `${percent}%`;
            
            const bars = document.querySelectorAll('.progress-segment');
            bars.forEach((bar, idx) => {
                if (idx < count) {
                    bar.classList.remove('bg-surface-dim');
                    bar.classList.add('bg-primary');
                } else {
                    bar.classList.remove('bg-primary');
                    bar.classList.add('bg-surface-dim');
                }
            });
        }
    })();
</script>
